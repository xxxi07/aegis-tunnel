# AEGIS-Tunnel — WireGuard-style config
# Usage: ./aegis-tunnel -c /etc/aegis/wg0.conf

[Interface]
PrivateKey = ~/.aegis-tunnel/private.key
Address = 10.0.0.1/24
Port = 9000
Mode = server

[Peer]
PublicKey = a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
Endpoint = 0.0.0.0:0
AllowedIPs = 10.0.0.0/24

[Tunnel]
Keepalive = 30
Timeout = 10
MaxConnections = 64
NATInterface = eth0
