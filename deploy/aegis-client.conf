# AEGIS-Tunnel — WireGuard-style config (Client)
# Usage: ./aegis-tunnel -c /etc/aegis/aegis.conf

[Interface]
PrivateKey = ~/.aegis-tunnel/private.key
Address = 10.0.0.2/24
Port = 9000
Mode = client

[Peer]
PublicKey = b1c2d3e4f5a6b1c2d3e4f5a6b1c2d3e4a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3
Endpoint = server.com:9000
AllowedIPs = 10.0.0.0/24

[Tunnel]
Keepalive = 30
Timeout = 10
