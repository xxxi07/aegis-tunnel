# AEGIS-Tunnel — WireGuard-style config
# Usage: ./aegis-tunnel -c /etc/aegis/aegis.conf

[Interface]
PrivateKey = ~/.aegis-tunnel/private.key
Address = 10.0.0.1/24
Port = 9000
Mode = server

[Peer]
# AllowedIPs = 10.0.0.0/24       ← 子网模式
AllowedIPs = 0.0.0.0/0           ← 全隧道模式

[Tunnel]
Keepalive = 30
Timeout = 10
MaxConnections = 64
NATInterface = eth0
